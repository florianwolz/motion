name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (with wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/motion-ui/package-lock.json

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install UI dependencies
        working-directory: apps/motion-ui
        run: npm ci

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Build Rust release artifacts
        run: cargo build --workspace --release --locked

      - name: Build WASM release package
        run: wasm-pack build crates/motion-wasm --target web --release --no-opt

      - name: Build UI release bundle
        working-directory: apps/motion-ui
        run: npm run build

      - name: Package release artifacts
        run: |
          mkdir -p dist
          tar -C crates/motion-wasm -czf dist/motion-wasm-pkg-${{ github.ref_name }}.tar.gz pkg
          tar -C apps/motion-ui -czf dist/motion-ui-dist-${{ github.ref_name }}.tar.gz dist
          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/motion-wasm-pkg-${{ github.ref_name }}.tar.gz
            dist/motion-ui-dist-${{ github.ref_name }}.tar.gz
            dist/checksums.txt
